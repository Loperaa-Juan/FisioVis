<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @variant dark (&:is(.dark *));
    </style>
    <script>
      if (localStorage.theme === 'dark' ||
          (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <title>FisioVis</title>
  </head>
  <body class="bg-white dark:bg-gray-900">
    <!-- Fixed toggle: this page has no navbar -->
    <button
      type="button"
      onclick="toggleDark()"
      class="fixed top-4 right-4 z-50 rounded-full p-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-yellow-300 shadow-md transition hover:bg-gray-200 dark:hover:bg-gray-600"
      aria-label="Toggle dark mode"
    >
      <svg class="h-5 w-5 dark:hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
      </svg>
      <svg class="h-5 w-5 hidden dark:block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
      </svg>
    </button>

    <section class="bg-white dark:bg-gray-900 lg:grid lg:h-screen lg:place-content-center">
      <div
        class="mx-auto w-screen max-w-7xl px-4 py-16 sm:px-6 sm:py-24 lg:px-8 lg:py-32"
      >
        <div class="mx-auto max-w-5xl text-center space-y-6">
          <h1 class="text-4xl font-bold text-gray-900 dark:text-gray-100 sm:text-5xl">
            Mejora tus evaluaciones y seguimiento
            <strong class="text-teal-600"> fisioterapéutico </strong>
            con FisioVis
          </h1>

          <p class="mt-4 text-base text-pretty text-gray-700 dark:text-gray-300 sm:text-lg/relaxed">
            Optimiza el análisis postural y la medición de movimientos con
            herramientas inteligentes. Captura, compara y genera informes clínicos
            en segundos.
          </p>

          <div class="mt-4 flex justify-center gap-4 sm:mt-6">
            <a
              class="inline-block rounded border border-teal-700 bg-teal-600 px-12 py-3 text-sm font-medium text-white hover:bg-teal-700 dark:hover:bg-teal-500 focus:outline-none focus:ring active:text-indigo-500"
              href="{% url 'login' %}"
            >
              Comenzar ahora
            </a>

            <a
              class="inline-block rounded border border-gray-200 dark:border-gray-600 px-5 py-3 font-medium text-gray-700 dark:text-gray-300 shadow-sm transition-colors hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-100"
              href="{% url 'about' %}"
            >
              Ver cómo funciona
            </a>
          </div>
        </div>
      </div>
    </section>

    <script>
      function toggleDark() {
        const html = document.documentElement;
        html.classList.toggle('dark');
        localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
      }
    </script>
  </body>
</html>
